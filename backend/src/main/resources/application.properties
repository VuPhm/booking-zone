spring.application.name=booking-service
# Cấu hình kết nối cơ sở dữ liệu PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/booking_db
spring.datasource.username=postgres
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create

# JWT Configuration
# Chuỗi mã hóa hex hoặc chuỗi text dài tối thiểu 512-bit (64 bytes)
jwt.secret=9a4f2c8d3e1b7f6a5c4d3b2a1e0f9c8b7a6f5e4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e6d5c4b3a2f1e0d9c8b7a6f5e4d3c2b1a0f9e8d7c6b5a4f3e2d
# Thời gian sống: 24 giờ tính bằng mili giây (24 * 60 * 60 * 1000)
jwt.expiration.ms=86400000